# ---------------------------------------------------------------------------
# Nifty 500 short-side mean reversion - strategy & execution configuration
# EDIT capital + risk numbers to match your account before going live.
# ---------------------------------------------------------------------------

capital: 1000000              # trading capital in Rs (10 lakh)

risk:
  risk_per_trade_pct: 0.75    # % of capital risked between entry and stop
  lot_risk_tolerance: 1.5     # futures: allow 1 lot even if risk <= 1.5x budget
  max_positions: 5            # max concurrent open shorts
  max_new_trades_per_day: 3   # throttle fresh entries
  max_exposure_per_trade_pct: 25   # notional cap per trade, % of capital
  max_total_exposure_pct: 60  # total short notional cap, % of capital
  max_daily_loss_pct: 2.0     # kill switch: no new entries once the day P&L
                              # (realised + M2M, as Kite reports it) is past this
  min_reward_risk: 1.2        # v2: wider 1-ATR stops shrink the ratio; backtest
                              # says 1.2 with a 51% win rate beats 2.0 with 30%
  max_stop_distance_pct: 6.0  # v2: room for the 1-ATR stop (was 3.5)

filters:
  min_score: 50               # composite scanner score floor
  allowed_setups:             # v2: DEAD-CAT BOUNCE only. BLOWOFF EXTENSION
    - "DEAD-CAT BOUNCE"       # backtested at PF 0.61 - fading strength in
                              # India loses; shorting bounced weakness wins
  fno_only: false             # v3 intraday: MIS cash shorts are legal on ANY
                              # stock, so the whole liquid universe is fair game
  max_adx: 35                 # never fade a freight train
  exclude_ban_list: true      # drop names in the NSE F&O ban list

entry:
  mode: fvg_retrace           # v3: breakdown arms a retrace hunt; enter on the
                              # pullback into an FVG/IFVG zone (tight stop above
                              # the zone -> far better R:R than the daily stop).
                              # breakdown = legacy SL-sell below scan-day low
                              # at_open   = sell at next open (aggressive)
  breakdown_buffer_pct: 0.10  # trigger = scan-day low * (1 - 0.10%)
  limit_slippage_pct: 0.25    # SL order limit price this far below trigger
  product: MIS_EQ             # v3: intraday cash short, squared off same day
                              # (NRML_FUT = multi-day futures, legacy mode)
  entry_valid_sessions: 1     # entry orders are DAY validity; they are re-armed
                              # each morning until this many sessions have passed

exits:
  use_gtt: true               # NRML: server-side GTT OCO exits (one leg cancels
                              # the other at the broker; survives this machine
                              # being off). MIS always uses the regular pair.
  gtt_stop_limit_buffer_pct: 0.5  # stop leg fires a BUY LIMIT this far above its
                              # trigger so it fills like a market order
  time_stop_sessions: 7       # close at market after 7 sessions, thesis expired
                              # (legacy NRML mode; MIS is same-day by definition)
  mis_squareoff_time: "14:55" # v3: flat before 15:00, ahead of broker RMS

live:                         # intraday layer (scripts/live_scan.py)
  scan_start: "09:20"         # let the opening auction noise settle first
  entry_cutoff: "11:00"       # IST - no entries after this, script exits
  rescan_interval_sec: 300    # full watchlist re-rank every 5 minutes
  entry_check_interval_sec: 60   # ARMED names checked every 1-minute bar
  arm_distance_atr: 0.5       # ARMED when price is within 0.5 ATR of trigger
  opening_range_min: 15       # opening-range window for structure checks
  rvol_min: 0.8               # min relative volume to allow an entry
  # --- fvg_retrace entry mode ---
  fvg_min_gap_pct: 0.05       # min 3-candle gap size (% of price) to count
  zone_buffer_pct: 0.05       # stop sits this far above the zone top
  intraday_target_r: 2.5      # target = daily 20-EMA or 2.5R, whichever nearer
  min_entry_rr: 1.5           # skip retests offering less than this R:R
  min_reward_move_pct: 1.5    # EOD gate: trigger->target meat required

kite:
  api_key_env: KITE_API_KEY         # set in config/secrets.env
  api_secret_env: KITE_API_SECRET
  access_token_file: config/.access_token
  order_tag: mrshort                # tag on every order this system places

dry_run: true                 # SAFETY INTERLOCK: going live requires BOTH this
                              # set to false AND the --live flag on the script
